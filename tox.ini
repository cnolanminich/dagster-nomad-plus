[tox]
envlist = default
skipsdist = true

[testenv]
download = True
passenv =
    HOME
    BUILDKITE*
    CI_*
    DAGSTER_*
    NOMAD_*
    PYTEST_ADDOPTS
    PYTEST_PLUGINS
install_command = uv pip install {opts} {packages}
deps =
  -e ../../dagster[test]
  -e ../../dagster-pipes
  -e ../../libraries/dagster-shared
  -e ../../dagster-graphql
  -e ../../dagster-test
  respx
  -e .
allowlist_externals =
  /bin/bash
  uv
commands =
  !windows: /bin/bash -c '! pip list --exclude-editable | grep -e dagster'
  pytest --log-cli-level=INFO -vv {posargs}
